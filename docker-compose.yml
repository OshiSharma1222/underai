services:
  postgres:
    image: postgres:16-alpine
    container_name: underai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: underai
      POSTGRES_PASSWORD: underai
      POSTGRES_DB: underai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
